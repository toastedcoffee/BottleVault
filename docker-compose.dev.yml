services:
  postgres:
    image: postgres:16-alpine
    container_name: bottlevault-db-dev
    environment:
      POSTGRES_DB: bottlevault
      POSTGRES_USER: bottlevault
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bottlevault"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

volumes:
  postgres_dev_data:
