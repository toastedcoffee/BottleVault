services:
  postgres:
    image: postgres:16-alpine
    container_name: bottlevault-db
    environment:
      POSTGRES_DB: bottlevault
      POSTGRES_USER: bottlevault
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bottlevault"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bottlevault-api
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/bottlevault
      DATABASE_USERNAME: bottlevault
      DATABASE_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bottlevault-web
    ports:
      - "${PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
