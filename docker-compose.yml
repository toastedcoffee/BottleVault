services:
  postgres:
    image: postgres:16-alpine
    container_name: bottlevault-db
    environment:
      POSTGRES_DB: bottlevault
      POSTGRES_USER: bottlevault
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bottlevault"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bottlevault-api
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/bottlevault
      DATABASE_USERNAME: bottlevault
      DATABASE_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production-must-be-at-least-256-bits-long!!}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bottlevault-web
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
