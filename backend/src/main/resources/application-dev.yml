spring:
  datasource:
    url: jdbc:h2:mem:bottlevault_dev;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8085

app:
  jwt:
    secret: dev-secret-key-change-in-production-must-be-at-least-256-bits-long!!
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  registration:
    enabled: true
