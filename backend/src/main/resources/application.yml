spring:
  application:
    name: bottlevault

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/bottlevault}
    username: ${DATABASE_USERNAME:bottlevault}
    password: ${DATABASE_PASSWORD:bottlevault}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-at-least-256-bits-long!!}
    expiration-ms: 86400000      # 24 hours
    refresh-expiration-ms: 604800000  # 7 days
  registration:
    enabled: ${REGISTRATION_ENABLED:true}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
