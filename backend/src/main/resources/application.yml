spring:
  application:
    name: bottlevault

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000      # 24 hours
    refresh-expiration-ms: 604800000  # 7 days
  registration:
    enabled: ${REGISTRATION_ENABLED:true}
  cors:
    # Comma-separated list of allowed origins for CORS on /api/**
    # Example: https://cellar.bottlevault.app,https://bottlevault.app
    allowed-origins: ${ALLOWED_ORIGINS:}
  barcode:
    # Days to suppress external lookups for a UPC after every provider has missed.
    miss-ttl-days: ${BARCODE_MISS_TTL_DAYS:7}
    barcodelookup:
      # Optional paid provider. Empty value disables the provider entirely.
      api-key: ${BARCODE_LOOKUP_API_KEY:}
  uploads:
    # Directory where bottle images are stored. Mounted as a volume in docker-compose.
    dir: ${UPLOADS_DIR:/app/uploads}

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:false}
