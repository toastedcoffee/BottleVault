spring:
  datasource:
    url: jdbc:h2:mem:bottlevault_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true

app:
  jwt:
    secret: test-secret-key-for-testing-must-be-at-least-256-bits-long-enough!!
    expiration-ms: 3600000
    refresh-expiration-ms: 86400000
  registration:
    enabled: true
  rate-limit:
    max-attempts: 1000
    window-seconds: 60
  barcode:
    miss-ttl-days: 7
    barcodelookup:
      api-key: ""
