# BottleVault Production Compose — for Dockge / TrueNAS / home servers.
# Uses pre-built images from GitHub Container Registry (no source code needed).
#
# Dockge: Create a stack called "bottlevault" and paste this in.
# CLI:    docker compose -f docker-compose.prod.yml up -d
#
# Required environment variables (set in Dockge UI or .env file):
#   DB_PASSWORD    — database password
#   JWT_SECRET     — JWT signing key (generate with: openssl rand -base64 48)
#   TUNNEL_TOKEN   — Cloudflare Tunnel token (from Zero Trust dashboard)
#
# Optional environment variables (sensible defaults):
#   REGISTRATION_ENABLED — allow new user registration (default: true)
#   SWAGGER_ENABLED      — expose Swagger UI at /swagger-ui (default: false)
#   ALLOWED_ORIGINS      — comma-separated public URLs for CORS (default: none — set when using a tunnel)
#   PORT                 — host port for the web UI (default: 80)

services:
  postgres:
    image: postgres:16-alpine
    container_name: bottlevault-db
    environment:
      POSTGRES_DB: bottlevault
      POSTGRES_USER: bottlevault
      POSTGRES_PASSWORD: $DB_PASSWORD
    # Bind mount keeps data visible on the host for ZFS snapshots / backups.
    # On TrueNAS with Dockge this resolves to /mnt/<pool>/configs/stacks/bottlevault/data/postgres
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    # expose (not ports) — Postgres is only reachable from the internal Docker network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bottlevault"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/toastedcoffee/bottlevault-api:latest
    container_name: bottlevault-api
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/bottlevault
      DATABASE_USERNAME: bottlevault
      DATABASE_PASSWORD: $DB_PASSWORD
      JWT_SECRET: $JWT_SECRET
      # Set to false after creating your account to lock down self-registration
      REGISTRATION_ENABLED: true
      # Swagger UI is disabled in prod by default — also blocked at nginx as defense in depth
      SWAGGER_ENABLED: false
      # Comma-separated allowed origins for CORS on /api/**.
      # Example: https://cellar.bottlevault.app
      # Multiple: https://cellar.bottlevault.app,https://bottlevault.app
      # Required when the frontend is accessed via Cloudflare Tunnel or any non-localhost URL.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
    depends_on:
      postgres:
        condition: service_healthy
    # Internal only — frontend (nginx) reaches it at http://backend:8080, nothing external
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    image: ghcr.io/toastedcoffee/bottlevault-web:latest
    container_name: bottlevault-web
    # The only service bound to a host port — serves the React app and proxies /api/ to backend
    ports:
      - 3312:80
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Cloudflare Tunnel — outbound connection to Cloudflare's edge, no ports opened on the host.
  # Routes traffic from your public hostname to http://frontend:80 (configured in CF dashboard).
  # Remove this service if deploying LAN-only without external access.
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: bottlevault-tunnel
    command: tunnel run
    environment:
      TUNNEL_TOKEN: $TUNNEL_TOKEN
    depends_on:
      frontend:
        condition: service_started
    restart: unless-stopped
