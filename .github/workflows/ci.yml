name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v5
      - name: Run backend tests
        working-directory: ./backend
        run: ./gradlew test

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Type check
        working-directory: ./frontend
        run: npm run type-check
      - name: Lint
        working-directory: ./frontend
        run: npm run lint
      - name: Test
        working-directory: ./frontend
        run: npm run test

  publish-images:
    needs: [backend-test, frontend-check]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend image
        run: |
          docker build -t ghcr.io/toastedcoffee/bottlevault-api:latest -t ghcr.io/toastedcoffee/bottlevault-api:${{ github.sha }} ./backend
          docker push ghcr.io/toastedcoffee/bottlevault-api --all-tags
      - name: Build and push frontend image
        run: |
          docker build -t ghcr.io/toastedcoffee/bottlevault-web:latest -t ghcr.io/toastedcoffee/bottlevault-web:${{ github.sha }} ./frontend
          docker push ghcr.io/toastedcoffee/bottlevault-web --all-tags
